<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Icon Studio</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px;
    background: #fafaf9;
    color: #1c1917;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Tab bar ─────────────────────────────────────── */
  .tab-bar {
    display: flex;
    border-bottom: 1px solid #e7e5e4;
    background: #fff;
    flex-shrink: 0;
  }
  .tab {
    flex: 1;
    padding: 9px 8px;
    border: none;
    border-bottom: 2px solid transparent;
    background: none;
    font-size: 11px;
    font-weight: 500;
    color: #a8a29e;
    cursor: pointer;
    transition: color 0.1s, border-color 0.1s;
    letter-spacing: 0.01em;
  }
  .tab:hover { color: #1c1917; }
  .tab.active { color: #1c1917; border-bottom-color: #1c1917; }

  /* ── Panel container ─────────────────────────────── */
  .panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

  /* ── Browse: header ──────────────────────────────── */
  .browse-header {
    padding: 10px 12px 8px;
    background: #fff;
    border-bottom: 1px solid #e7e5e4;
    flex-shrink: 0;
  }
  .search-wrap { position: relative; }
  .search-icon {
    position: absolute; left: 8px; top: 50%;
    transform: translateY(-50%); color: #a8a29e; pointer-events: none;
  }
  .search {
    width: 100%; height: 30px; padding: 0 8px 0 28px;
    border: 1px solid #d6d3d1; border-radius: 6px;
    font-size: 12px; background: #fafaf9; color: #1c1917; outline: none;
    transition: border-color 0.1s, background 0.1s;
  }
  .search::placeholder { color: #a8a29e; }
  .search:focus { border-color: #1c1917; background: #fff; }

  /* ── Filter row with dropdowns ───────────────────── */
  .filter-row { display: flex; gap: 6px; margin-top: 7px; }

  .dd-wrap { position: relative; }

  .dd-btn {
    display: flex; align-items: center; gap: 4px;
    height: 26px; padding: 0 8px;
    border: 1px solid #d6d3d1; border-radius: 6px;
    font-size: 11px; font-weight: 500; color: #78716c; background: #fff;
    cursor: pointer; white-space: nowrap; transition: all 0.1s;
  }
  .dd-btn:hover { border-color: #a8a29e; color: #1c1917; }
  .dd-btn.active { border-color: #1c1917; color: #1c1917; }

  .dd-chevron { transition: transform 0.15s; flex-shrink: 0; }
  .dd-btn[aria-expanded="true"] .dd-chevron { transform: rotate(180deg); }

  .dd-menu {
    position: absolute; top: calc(100% + 4px); left: 0;
    background: #fff; border: 1px solid #e7e5e4; border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    min-width: 148px; z-index: 100; overflow: hidden;
    display: none;
  }
  .dd-menu.open { display: block; }

  .dd-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; font-size: 12px; color: #44403c;
    cursor: pointer; transition: background 0.1s; user-select: none;
  }
  .dd-item:hover { background: #f5f5f4; }
  .dd-item.active { color: #1c1917; font-weight: 500; }

  .dd-check { width: 12px; height: 12px; flex-shrink: 0; color: #1c1917; }
  .dd-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dd-sep { border: none; border-top: 1px solid #f0efee; margin: 2px 0; }

  /* ── Browse: list ────────────────────────────────── */
  .scroll { flex: 1; overflow-y: auto; overflow-x: hidden; min-height: 0; }
  .list { display: flex; flex-direction: column; }

  .icon-row {
    display: flex; align-items: center; gap: 10px;
    padding: 0 12px; height: 32px; cursor: pointer; flex-shrink: 0;
    transition: background 0.1s; user-select: none;
  }
  .icon-row:hover { background: #f5f5f4; }
  .icon-row.selected { background: #f0efee; box-shadow: inset 2px 0 0 #1c1917; }

  .icon-row-svg {
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .icon-row-svg svg { display: block; width: 18px; height: 18px; }

  .icon-row-name {
    font-size: 12px; color: #1c1917;
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ── State box (loading / empty / error) ─────────── */
  .state-box {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; padding: 36px 20px; color: #a8a29e; text-align: center;
  }
  .state-box svg { color: #d6d3d1; }

  /* ── Browse: footer ──────────────────────────────── */
  .count { font-size: 10px; color: #a8a29e; text-align: right; padding: 3px 10px; flex-shrink: 0; }
  .browse-footer { padding: 10px 12px; background: #fff; border-top: 1px solid #e7e5e4; flex-shrink: 0; }
  .insert-btn {
    width: 100%; height: 32px; border: none; border-radius: 6px;
    font-size: 12px; font-weight: 500; cursor: pointer; transition: background 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .insert-btn:not(:disabled) { background: #1c1917; color: #fff; }
  .insert-btn:not(:disabled):hover { background: #292524; }
  .insert-btn:disabled { background: #f5f5f4; color: #a8a29e; cursor: default; border: 1px solid #e7e5e4; }
  .insert-btn.done  { background: #166534 !important; color: #fff !important; }
  .insert-btn.err   { background: #991b1b !important; color: #fff !important; }

  /* ── Add panel ───────────────────────────────────── */
  .add-scroll { flex: 1; overflow-y: auto; padding: 12px; min-height: 0; }

  /* Selection card */
  .sel-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 7px; padding: 36px 20px; color: #a8a29e; text-align: center;
  }
  .sel-empty svg { color: #d6d3d1; }

  .sel-card {
    display: flex; align-items: center; gap: 9px;
    padding: 9px 10px; background: #fff; border: 1px solid #e7e5e4; border-radius: 8px; margin-bottom: 12px;
  }
  .sel-card-icon { color: #a8a29e; flex-shrink: 0; }
  .sel-card-body { flex: 1; min-width: 0; }
  .sel-card-name { font-weight: 500; color: #1c1917; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sel-card-type { font-size: 10px; color: #a8a29e; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 1px; }

  /* Export button */
  .export-btn {
    width: 100%; height: 30px; border: 1px solid #d6d3d1; border-radius: 6px;
    font-size: 12px; font-weight: 500; color: #1c1917; background: #fff; cursor: pointer;
    transition: all 0.1s; display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .export-btn:hover { border-color: #1c1917; }

  /* SVG preview box */
  .svg-preview {
    width: 72px; height: 72px; display: flex; align-items: center; justify-content: center;
    background: #f5f5f4; border: 1px solid #e7e5e4; border-radius: 10px;
    margin: 0 auto 14px; color: #1c1917; overflow: hidden;
  }
  .svg-preview svg { max-width: 48px; max-height: 48px; display: block; }

  /* Form */
  .form-section { margin-bottom: 13px; }
  .form-label {
    font-size: 10px; font-weight: 600; color: #78716c;
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; display: block;
  }
  .form-input {
    width: 100%; height: 30px; padding: 0 10px;
    border: 1px solid #d6d3d1; border-radius: 6px;
    font-size: 12px; color: #1c1917; background: #fff; outline: none; transition: border-color 0.1s;
  }
  .form-input:focus { border-color: #1c1917; }

  /* Style picker */
  .style-row { display: flex; gap: 4px; }
  .style-btn {
    flex: 1; padding: 5px 4px; border: 1px solid #d6d3d1; border-radius: 6px;
    font-size: 11px; font-weight: 500; color: #78716c; background: #fff;
    cursor: pointer; text-align: center; transition: all 0.1s;
  }
  .style-btn:hover { border-color: #a8a29e; color: #1c1917; }
  .style-btn.active { background: #1c1917; border-color: #1c1917; color: #fff; }

  /* Brand pills in form */
  .brand-row { display: flex; gap: 4px; flex-wrap: wrap; }
  .brand-pill {
    padding: 3px 9px; border-radius: 999px; border: 1px solid #d6d3d1;
    font-size: 11px; font-weight: 500; cursor: pointer; background: #fff; color: #78716c;
    transition: all 0.1s; user-select: none;
  }
  .brand-pill:hover { border-color: #a8a29e; }
  .brand-pill.on[data-b="reddoorz"]  { background: #E63946; border-color: #E63946; color: #fff; }
  .brand-pill.on[data-b="sans"]      { background: #1D2A3A; border-color: #1D2A3A; color: #fff; }
  .brand-pill.on[data-b="urbanview"] { background: #2E7D6B; border-color: #2E7D6B; color: #fff; }
  .brand-pill.on[data-b="lavana"]    { background: #1B2A4A; border-color: #1B2A4A; color: #fff; }

  /* currentColor toggle */
  .toggle-row { display: flex; align-items: center; gap: 7px; cursor: pointer; user-select: none; }
  .toggle-row input { width: 13px; height: 13px; accent-color: #1c1917; cursor: pointer; }
  .toggle-row span { color: #44403c; }

  /* Divider */
  .rule { border: none; border-top: 1px solid #f0efee; margin: 12px 0; }

  /* Action buttons */
  .save-btn {
    width: 100%; height: 32px; border: none; border-radius: 6px;
    font-size: 12px; font-weight: 500; cursor: pointer; transition: background 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 4px;
  }
  .save-btn.primary { background: #1c1917; color: #fff; }
  .save-btn.primary:hover { background: #292524; }
  .save-btn.primary:disabled { background: #d6d3d1; color: #a8a29e; cursor: default; }
  .save-btn.outline { background: #fff; color: #78716c; border: 1px solid #d6d3d1; margin-top: 6px; }
  .save-btn.outline:hover { border-color: #a8a29e; color: #1c1917; }
  .save-btn.success { background: #166534; color: #fff; }

  /* Warning */
  .warn-box {
    background: #fef9c3; border: 1px solid #fde047; border-radius: 6px;
    padding: 7px 10px; font-size: 11px; color: #713f12; margin-bottom: 10px; line-height: 1.5;
  }
</style>
</head>

function sanitizeSvg(svg) {
  return svg
    .replace(/<script[\s\S]*?<\/script>/gi, "")
    .replace(/<foreignObject[\s\S]*?<\/foreignObject>/gi, "")
    .replace(/\son\w+\s*=\s*"[^"]*"/gi, "")
    .replace(/\son\w+\s*=\s*'[^']*'/gi, "")
    .replace(/javascript:/gi, "")
    .trim();
}

  const start = raw.indexOf("<svg");
  const end   = raw.lastIndexOf("</svg>");

  let s = raw.slice(start, end + 6);
  s = s.replace(/<svg([^>]*)>/i, (_, attrs) => {
    let a = attrs;
    const wm = a.match(/\swidth="([\d.]+)(?:px)?"/i);
    const hm = a.match(/\sheight="([\d.]+)(?:px)?"/i);
    a = a.replace(/\swidth="[^"]*"/i, "").replace(/\sheight="[^"]*"/i, "");

function normalizeToGrid(svg) {
  if (!svg) return svg;
  const vb = svg.match(/viewBox\s*=\s*["']\s*([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s*["']/i);
  if (!vb) return svg;
  const [minX, minY, w, h] = [vb[1], vb[2], vb[3], vb[4]].map(Number);
  if (w === 24 && h === 24) return svg;
  if (w !== h || minX !== 0 || minY !== 0) return svg;
  const scale = parseFloat((24 / w).toFixed(6));
  const out = svg.replace(/viewBox\s*=\s*["'][^"']*["']/i, 'viewBox="0 0 24 24"');
  const openEnd    = out.indexOf(">");
  const closeStart = out.lastIndexOf("</svg>");
  if (openEnd === -1 || closeStart === -1) return svg;
  return out.slice(0, openEnd + 1) + `<g transform="scale(${scale})">` + out.slice(openEnd + 1, closeStart) + "</g></svg>";
}

function forceCurrentColor(svg) {

  for (let blk = 0; blk < bytes.length >>> 6; blk++) {
    const o = blk << 6;
    for (let i = 0; i < 16; i++)
      w[i] = (bytes[o+i*4]<<24)|(bytes[o+i*4+1]<<16)|(bytes[o+i*4+2]<<8)|bytes[o+i*4+3];
    for (let i = 16; i < 64; i++) {
      const s0 = rotr32(w[i-15],7)^rotr32(w[i-15],18)^(w[i-15]>>>3);
      const s1 = rotr32(w[i-2],17)^rotr32(w[i-2],19)^(w[i-2]>>>10);
      w[i] = (w[i-16]+s0+w[i-7]+s1)|0;
    }
    let a=h0,b=h1,c=h2,d=h3,e=h4,f=h5,g=h6,h=h7;
    for (let i = 0; i < 64; i++) {
      const t1 = (h + (rotr32(e,6)^rotr32(e,11)^rotr32(e,25)) + ((e&f)^(~e&g)) + K[i] + w[i])|0;
      const t2 = ((rotr32(a,2)^rotr32(a,13)^rotr32(a,22)) + ((a&b)^(a&c)^(b&c)))|0;
      h=g; g=f; f=e; e=(d+t1)|0; d=c; c=b; b=a; a=(t1+t2)|0;
    }
    h0=(h0+a)|0; h1=(h1+b)|0; h2=(h2+c)|0; h3=(h3+d)|0;
    h4=(h4+e)|0; h5=(h5+f)|0; h6=(h6+g)|0; h7=(h7+h)|0;
  }
  return [h0,h1,h2,h3,h4,h5,h6,h7].map(n => (n>>>0).toString(16).padStart(8,'0')).join('');
}

function hashSvg(svg) {
  return sha256hex(svg.replace(/\s+/g, " ").trim());
}

function guessStyle(svg) {
  const hasFill   = /fill\s*[:=]\s*["']?currentColor/i.test(svg);
  const hasStroke = /stroke\s*[:=]\s*["']?currentColor/i.test(svg);
  const hasDuo    = /opacity\s*[:=]\s*["']?0\.[12]/i.test(svg);
  if (hasDuo && (hasStroke || hasFill)) return "duotone";
  if (hasFill && !hasStroke) return "filled";
  return "line";
}

function guessStroke(svg) {
  const m = svg.match(/stroke-width\s*[:=]\s*["']?([\d.]+)/i);
  return m ? parseFloat(m[1]) : 1.5;
}

function guessCorners(svg) {
  return /stroke-linecap\s*[:=]\s*["']?square/i.test(svg) ? "sharp" : "rounded";
}

function escHtml(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

/* ─── Browse state ─────────────────────────────────────────────────────── */
const browse = {
  brand:    "",
  style:    "",
  search:   "",
  selected: null,
  icons:    [],
};

const $list      = document.getElementById("list");
const $stateBox  = document.getElementById("stateBox");
const $count     = document.getElementById("count");
const $insertBtn = document.getElementById("insertBtn");
const $search    = document.getElementById("search");

function previewColor() {
  return browse.brand ? BRAND_COLORS[browse.brand] : NEUTRAL;
}

function insertColor() {
  return browse.brand ? BRAND_COLORS[browse.brand] : "#000000";
}

function bakeColor(svg, color) {
  return svg.replace(/currentColor/gi, color);
}

/* ─── Browse: fetch ────────────────────────────────────────────────────── */
async function loadIcons() {
  browse.selected = null;
  renderInsertBtn();
  showBrowseState("loading");

  try {
    const params = new URLSearchParams({
      select: "id,name,svg,style,brand_availability",
      order:  "name.asc",
      limit:  "500",
    });
    if (browse.search) params.set("name", `ilike.*${browse.search}*`);
    if (browse.style)  params.set("style", `eq.${browse.style}`);
    if (browse.brand)  params.set("brand_availability", `cs.{${browse.brand}}`);

    const res = await fetch(`${SUPABASE_URL}/rest/v1/icons?${params}`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
    });
    if (!res.ok) throw new Error(`${res.status}`);

    browse.icons = await res.json();
    renderList();
  } catch (err) {
    showBrowseState("error", err.message);
  }
}

/* ─── Browse: render ───────────────────────────────────────────────────── */
function renderList() {
  if (!browse.icons.length) { showBrowseState("empty"); return; }

  $stateBox.style.display = "none";
  $count.style.display    = "block";
  $count.textContent      = `${browse.icons.length} icon${browse.icons.length !== 1 ? "s" : ""}`;

  const color = previewColor();
  $list.innerHTML = browse.icons.map((icon) =>
    `<div class="icon-row" data-id="${icon.id}" title="${escHtml(icon.name)}">
       <div class="icon-row-svg" style="color:${color}">${icon.svg}</div>
       <div class="icon-row-name">${escHtml(icon.name)}</div>
     </div>`
  ).join("");
}

function showBrowseState(type, detail) {
  $list.innerHTML         = "";
  $count.style.display    = "none";
  $stateBox.style.display = "flex";
  if (type === "loading") {
    $stateBox.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-6.22-8.56"/></svg><span>Loading…</span>`;
  } else if (type === "empty") {
    $stateBox.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span>No icons found</span>`;
  } else {
    $stateBox.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>Failed to load</span><span style="font-size:10px;color:#d6d3d1">${escHtml(detail || "")}</span>`;
  }
}

function renderInsertBtn() {
  const btn = $insertBtn;
  if (browse.selected) {
    btn.disabled   = false;
    btn.className  = "insert-btn";
    btn.innerHTML  = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>Insert "${escHtml(browse.selected.name)}"`;
  } else {
    btn.disabled    = true;
    btn.className   = "insert-btn";
    btn.textContent = "Select an icon to insert";
  }
}

/* ─── Browse: list events ──────────────────────────────────────────────── */
$list.addEventListener("click", (e) => {
  const row = e.target.closest(".icon-row");
  if (!row) return;
  document.querySelectorAll(".icon-row.selected").forEach((r) => r.classList.remove("selected"));
  row.classList.add("selected");
  browse.selected = browse.icons.find((i) => i.id === row.dataset.id) ?? null;
  renderInsertBtn();
});

$insertBtn.addEventListener("click", () => {
  if (!browse.selected) return;
  parent.postMessage({
    pluginMessage: {
      type: "insert-icon",
      svg:  bakeColor(browse.selected.svg, insertColor()),
      name: browse.selected.name,
    },
  }, "*");
});

let searchTimer;
$search.addEventListener("input", (e) => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { browse.search = e.target.value.trim(); loadIcons(); }, 280);
});

/* ─── Dropdown logic ───────────────────────────────────────────────────── */
function closeAllDropdowns() {
  document.querySelectorAll(".dd-btn").forEach((b) => b.setAttribute("aria-expanded", "false"));
  document.querySelectorAll(".dd-menu").forEach((m) => m.classList.remove("open"));
}

document.addEventListener("click", (e) => {
  if (!e.target.closest(".dd-wrap")) closeAllDropdowns();
});

function setupDropdown(btnId, menuId) {
  const btn  = document.getElementById(btnId);
  const menu = document.getElementById(menuId);
  btn.addEventListener("click", (e) => {
    e.stopPropagation();
    const open = menu.classList.contains("open");
    closeAllDropdowns();
    if (!open) { menu.classList.add("open"); btn.setAttribute("aria-expanded", "true"); }
  });
}

setupDropdown("brandBtn", "brandMenu");
setupDropdown("styleBtn", "styleMenu");

document.getElementById("brandMenu").addEventListener("click", (e) => {
  const item = e.target.closest(".dd-item[data-brand]");
  if (!item) return;
  browse.brand = item.dataset.brand;

  document.getElementById("brandLabel").textContent = BRAND_LABELS[browse.brand];
  document.getElementById("brandBtn").classList.toggle("active", browse.brand !== "");

  document.querySelectorAll("#brandMenu .dd-item").forEach((el) => {
    const match = el.dataset.brand === browse.brand;
    el.classList.toggle("active", match);
    const chk = el.querySelector(".dd-check");
    if (chk) chk.style.visibility = match ? "visible" : "hidden";
  });

  closeAllDropdowns();

  const color = previewColor();
  document.querySelectorAll(".icon-row-svg").forEach((el) => { el.style.color = color; });

  loadIcons();
});

document.getElementById("styleMenu").addEventListener("click", (e) => {
  const item = e.target.closest(".dd-item[data-style]");
  if (!item) return;
  browse.style = item.dataset.style;

  document.getElementById("styleLabel").textContent = STYLE_LABELS[browse.style];
  document.getElementById("styleBtn").classList.toggle("active", browse.style !== "");

  document.querySelectorAll("#styleMenu .dd-item").forEach((el) => {
    const match = el.dataset.style === browse.style;
    el.classList.toggle("active", match);
    const chk = el.querySelector(".dd-check");
    if (chk) chk.style.visibility = match ? "visible" : "hidden";
  });

  closeAllDropdowns();
  loadIcons();
});

/* ─── Add to Library state ─────────────────────────────────────────────── */
const add = {
  node:          null,  // { id, name, type } from Figma sandbox
  rawSvg:        null,  // SVG as exported by Figma
  processedSvg:  null,  // after normalization
  formName:      "",
  formStyle:     "line",
  formBrands:    [...ALL_BRANDS],
  forceCC:       true,
  phase:         "select",  // select | exporting | preview | saving | done | duplicate
  dupName:       "",
};

const $addContent = document.getElementById("addContent");

function renderAdd() {
  switch (add.phase) {
    case "select":     return renderAddSelect();
    case "exporting":  return renderAddExporting();
    case "preview":    return renderAddPreview();
    case "saving":     return renderAddSaving();
    case "done":       return renderAddDone();
    case "duplicate":  return renderAddDuplicate();
  }
}

/* ── Select phase ── */
function renderAddSelect() {
  if (!add.node) {
    $addContent.innerHTML = `
      <div class="sel-empty">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
        </svg>
        <strong style="color:#44403c;font-size:12px">Select a layer in Figma</strong>
        <span style="font-size:11px;line-height:1.5">Select any frame, component, group,<br>or icon to add it to the library.</span>
      </div>`;
    return;
  }

  $addContent.innerHTML = `
    <div class="sel-card">
      <span class="sel-card-icon">${nodeTypeIcon(add.node.type)}</span>
      <div class="sel-card-body">
        <div class="sel-card-name">${escHtml(add.node.name)}</div>
        <div class="sel-card-type">${add.node.type.replace("_", " ").toLowerCase()}</div>
      </div>
    </div>
    <button class="export-btn" id="exportBtn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Export &amp; Configure
    </button>`;

  document.getElementById("exportBtn").addEventListener("click", () => {
    add.phase = "exporting";
    renderAdd();
    parent.postMessage({ pluginMessage: { type: "export-frame", nodeId: add.node.id } }, "*");
  });
}

/* ── Exporting phase ── */
let _exportAckTimer = null;

function renderAddExporting() {
  $addContent.innerHTML = `
    <div class="sel-empty">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-6.22-8.56"/></svg>
      <span>Exporting SVG…</span>
    </div>`;

  // If the sandbox doesn't acknowledge within 6s, the message channel is broken.
  clearTimeout(_exportAckTimer);
  _exportAckTimer = setTimeout(() => {
    if (add.phase !== "exporting") return;
    add.phase = "select";
    renderAdd();
    const banner = document.createElement("div");
    banner.className = "warn-box";
    banner.style.cssText = "background:#fef2f2;border-color:#fca5a5;color:#991b1b;margin-top:8px";
    banner.textContent = "Plugin sandbox not responding. Close and reopen the plugin, then try again.";
    $addContent.appendChild(banner);
  }, 6000);
}

/* ── Preview + form phase ── */
function renderAddPreview() {
  const svg = add.processedSvg;
  const previewSvg = svg
    ? svg.replace(/<svg([^>]*)>/i, '<svg$1 width="48" height="48">')
    : "";

  $addContent.innerHTML = `
    <div class="svg-preview" id="svgPreviewBox">${previewSvg}</div>

    <div class="form-section">
      <label class="form-label">Name</label>
      <input class="form-input" id="formName" type="text" value="${escHtml(add.formName)}" placeholder="Icon name">
    </div>

    <div class="form-section">
      <label class="form-label">Style</label>
      <div class="style-row">
        <button class="style-btn${add.formStyle === "line"    ? " active" : ""}" data-s="line">Line</button>
        <button class="style-btn${add.formStyle === "filled"  ? " active" : ""}" data-s="filled">Filled</button>
        <button class="style-btn${add.formStyle === "duotone" ? " active" : ""}" data-s="duotone">Duotone</button>
      </div>
    </div>

    <div class="form-section">
      <label class="form-label" style="margin-bottom:6px">Replace colors with currentColor</label>
      <label class="toggle-row">
        <input type="checkbox" id="forceCCCheck" ${add.forceCC ? "checked" : ""}>
        <span>${add.forceCC ? "On — icon will adapt to brand color" : "Off — original colors kept"}</span>
      </label>
    </div>

    <div class="form-section">
      <label class="form-label">Brand availability</label>
      <div class="brand-row" id="brandRow">
        <button class="brand-pill${add.formBrands.length === ALL_BRANDS.length ? " on" : ""}" data-b="all">All brands</button>
        <button class="brand-pill${add.formBrands.includes("reddoorz")  ? " on" : ""}" data-b="reddoorz">RedDoorz</button>
        <button class="brand-pill${add.formBrands.includes("sans")      ? " on" : ""}" data-b="sans">SANS</button>
        <button class="brand-pill${add.formBrands.includes("urbanview") ? " on" : ""}" data-b="urbanview">Urbanview</button>
        <button class="brand-pill${add.formBrands.includes("lavana")    ? " on" : ""}" data-b="lavana">Lavana</button>
      </div>
    </div>

    <hr class="rule">

    <button class="save-btn primary" id="saveBtn">Save to Library</button>
    <button class="save-btn outline" id="reselectBtn">← Choose different layer</button>`;

  /* form events */
  document.getElementById("formName").addEventListener("input", (e) => { add.formName = e.target.value; });

  document.querySelectorAll(".style-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      add.formStyle = btn.dataset.s;
      document.querySelectorAll(".style-btn").forEach((b) => b.classList.toggle("active", b.dataset.s === add.formStyle));
    });
  });

  document.getElementById("forceCCCheck").addEventListener("change", (e) => {
    add.forceCC = e.target.checked;
    add.processedSvg = processRawSvg(add.rawSvg, add.forceCC);
    add.formStyle = guessStyle(add.processedSvg);
    const preview = add.processedSvg.replace(/<svg([^>]*)>/i, '<svg$1 width="48" height="48">');
    document.getElementById("svgPreviewBox").innerHTML = preview;
    e.target.nextElementSibling.textContent = add.forceCC
      ? "On — icon will adapt to brand color"
      : "Off — original colors kept";
    document.querySelectorAll(".style-btn").forEach((b) => b.classList.toggle("active", b.dataset.s === add.formStyle));
  });

  document.getElementById("brandRow").addEventListener("click", (e) => {
    const btn = e.target.closest(".brand-pill");
    if (!btn) return;
    if (btn.dataset.b === "all") {
      add.formBrands = [...ALL_BRANDS];
    } else {
      if (add.formBrands.includes(btn.dataset.b)) {
        add.formBrands = add.formBrands.filter((b) => b !== btn.dataset.b);
        if (!add.formBrands.length) add.formBrands = [...ALL_BRANDS];
      } else {
        add.formBrands.push(btn.dataset.b);
      }
    }
    document.querySelectorAll(".brand-pill").forEach((p) => {
      if (p.dataset.b === "all") p.classList.toggle("on", add.formBrands.length === ALL_BRANDS.length);
      else p.classList.toggle("on", add.formBrands.includes(p.dataset.b));
    });
  });

  document.getElementById("saveBtn").addEventListener("click", saveToLibrary);
  document.getElementById("reselectBtn").addEventListener("click", () => {
    add.phase = "select";
    add.rawSvg = null;
    add.processedSvg = null;
    renderAdd();
  });
}

/* ─── Add: helpers ─────────────────────────────────────────────────────── */
function processRawSvg(raw, applyCC) {
  const sanitized  = sanitizeSvg(raw);
  const normalized = normalizeToGrid(normalizeImportedSvg(sanitized));
  return applyCC ? forceCurrentColor(normalized) : normalized;
}

async function saveToLibrary(skipDupCheck) {
  add.phase = "saving";
  renderAddSaving();

  try {
    const svg = add.processedSvg;
    if (!svg) throw new Error("SVG is empty — try exporting the layer again.");

    const hash = hashSvg(svg);

    if (!skipDupCheck) {
      const dupRes = await fetch(
        `${SUPABASE_URL}/rest/v1/icons?content_hash=eq.${hash}&select=id,name&limit=1`,
        { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
      );
      if (!dupRes.ok) throw new Error(`Duplicate check failed (${dupRes.status})`);
      const dups = await dupRes.json();
      if (dups.length) {
        add.dupName = dups[0].name;
        add.phase   = "duplicate";
        renderAdd();
        return;
      }
    }

    const payload = {
      name:               (add.formName || add.node.name).trim(),
      svg,
      style:              add.formStyle,
      source:             "imported",
      brand_availability: add.formBrands,
      content_hash:       hash,
      stroke_width:       guessStroke(svg),
      corners:            guessCorners(svg),
    };

    const res = await fetch(`${SUPABASE_URL}/rest/v1/icons`, {
      method:  "POST",
      headers: {
        apikey:          SUPABASE_KEY,
        Authorization:   `Bearer ${SUPABASE_KEY}`,
        "Content-Type":  "application/json",
        Prefer:          "return=minimal",
      },
      body: JSON.stringify(payload),
    });

    if (!res.ok) {
      const detail = await res.text().catch(() => "");
      throw new Error(`Server error ${res.status}${detail ? ": " + detail.slice(0, 160) : ""}`);
    }

    add.formName = payload.name;
    add.phase    = "done";
    renderAdd();

  } catch (err) {
    add.phase = "preview";
    renderAdd();
    const errBox = document.createElement("div");
    errBox.className = "warn-box";
    errBox.style.cssText = "background:#fef2f2;border-color:#fca5a5;color:#991b1b;margin-top:8px";
    errBox.textContent = err.message || "Unknown error — check your connection and try again.";
    $addContent.appendChild(errBox);
  }
}

function nodeTypeIcon(type) {
  const icons = {
    FRAME:           `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>`,
    COMPONENT:       `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>`,
    COMPONENT_SET:   `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>`,
    GROUP:           `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,
    INSTANCE:        `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>`,
    VECTOR:          `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h4v4H4zM16 4h4v4h-4zM4 16h4v4H4zM16 16h4v4h-4zM8 6h8M18 8v8M16 18H8M6 16V8"/></svg>`,
  };
  return icons[type] || icons.FRAME;
}

/* ─── Tab switching ────────────────────────────────────────────────────── */
document.querySelectorAll(".tab").forEach((btn) => {
  btn.addEventListener("click", () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll(".tab").forEach((t) => t.classList.toggle("active", t.dataset.tab === tab));
    document.getElementById("browsePanel").style.display = tab === "browse" ? "flex" : "none";
    document.getElementById("addPanel").style.display    = tab === "add"    ? "flex" : "none";
    if (tab === "add") renderAdd();
  });
});

/* ─── Messages from Figma sandbox ──────────────────────────────────────── */
window.onmessage = (e) => {
  const msg = e.data?.pluginMessage;
  if (!msg) return;

  if (msg.type === "insert-done") {
    $insertBtn.className  = "insert-btn done";
    $insertBtn.textContent = "Inserted ✓";
    setTimeout(() => renderInsertBtn(), 1600);
    return;
  }
  if (msg.type === "insert-error") {
    $insertBtn.className  = "insert-btn err";
    $insertBtn.textContent = "Error — try again";
    setTimeout(() => renderInsertBtn(), 2000);
    return;
  }

  // Sandbox confirmed it received the export request — cancel the dead-channel timer.
  if (msg.type === "export-ack") {
    clearTimeout(_exportAckTimer);
    return;
  }

  if (msg.type === "selection") {
    add.node = msg.node;
    if (add.phase === "select") renderAdd();
    return;
  }

  if (msg.type === "export-done") {
    const raw        = new TextDecoder().decode(new Uint8Array(msg.bytes));
    add.rawSvg       = raw;
    add.processedSvg = processRawSvg(raw, add.forceCC);
    add.formName     = msg.name || "";
    add.formStyle    = guessStyle(add.processedSvg);
    add.formBrands   = [...ALL_BRANDS];
    add.phase        = "preview";
    renderAdd();
    return;
  }

  if (msg.type === "export-error") {
    add.phase = "select";
    renderAdd();
    const banner = document.createElement("div");
    banner.className = "warn-box";
    banner.style.background = "#fef2f2";
    banner.style.borderColor = "#fca5a5";
    banner.style.color = "#991b1b";
    banner.textContent = "Export failed: " + (msg.error || "unknown error");
    $addContent.appendChild(banner);
    return;
  }
};

/* ─── Init ─────────────────────────────────────────────────────────────── */
loadIcons();
</script>
